  text: 欽定四庫全書史部十四
  hash: sha256:1b0fee061afb4650a390a33f011206c9ad39b5a17ebb7b4f5e965df0aa8e4e0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0007_WYG_000-1a, image: WYG0675/WYG0675-0111a.png}
body:
  text: 文淵閣書目總目目錄類一經籍之屬卷一天字共五㕑三百二十一號國朝地字共四厨五百五十五號易書詩春秋周禮儀禮禮記𤣥字一厨一百四十九號禮書樂書諸經總類黃字共三厨四百七十四號四書性理附經濟卷二宇字共六厨二百七十二號史宙字共二厨三百十六號史附史雜洪字一厨一百九號子書荒字一厨二百七十六號子雜雜附日字共三厨七百四十五號文集月字共二厨五百六十八號詩詞卷三盈字共六厨二百六十六號類書昃字一厨一百七十六號韻書姓氏辰字共二厨三百六十四號法帖畫譜諸譜附宿字一厨二百二十八號政書刑書兵法算法列字共二厨五百五十二號陰陽醫書農圃卷四張字一厨一百九十九號道書寒字共二厨四百六號佛書來字一厨一百六十八號古今志雜志附暑字共三厨五百八十四號舊志往字共三厨新志臣等謹案文淵閣書目四卷明楊士竒編士竒有三朝聖諭録已著録是編前有正統六年題本一通稱各書自永樂十九年南京取來一向於左順門北廊收貯未有完整書目近奉㫖移貯於文淵東閣臣等逐一打㸃清切編置字號寫完一本總名文淵閣書目請用廣運之寳鈐識備照庻無遺失盖本當時閣中存記册籍故所載書多不著撰人姓氏又有册數而無卷數帷畧記若干部為一橱若干橱為一號而已考明自永樂間取南京蔵書送北京又命禮部尚書鄭賜四出購求所謂鋟板十三抄本十七者正統時尚完善無缺此書以千字文排次自天字至往字凡得二十號五十橱今以永樂大典對勘其所收之書世無傳本者往往見於此目亦可知其儲庋之富士竒等承詔編録不能考訂撰次勒為成書而徒草率以塞責較劉向之編七畧荀朂之叙中經誠為有愧然考王肯堂鬱岡齋筆麈書在明代已殘缺不完王士禎古夫于亭襍録亦載國初曹貞吉為内閣典籍文淵閣書㪚失殆盡貞吉檢閲見宋槧歐陽修居士集八部無一完者今閲百載已放失無餘惟藉此編之存尚得畧見一代秘書之名數則亦考古者所不廢也舊本不分卷數黄虞稷千頃堂書目作十四卷不知所據何本殆傳寫者以意分析今約畧篇頁釐定為四卷云乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀文淵閣書目題本少師兵部尚書兼華葢殿大學士臣楊士竒等謹題為書籍事查照本朝御製及古今經史子集之書自永樂十九年南京取囘來一向于左順門北廊收貯未有完整書目近奉聖旨移貯于文淵東閣臣等逐一打㸃清切編置字號寫完一本總名曰文淵閣書目合請用廣運之寳鈐識仍藏於文淵閣永逺備照庶無遺失未敢擅便謹題請旨正統六年六月二十六日少師兵部尚書兼華葢殿大學士臣楊士竒行在翰林院侍講學士臣馬愉翰林院侍講臣曹鼐當日早于奉天門欽奉聖旨是欽此次日於左順門用寳訖右文淵閣書目壹册用廣運之寳鈐縫壹百叁拾陸顆外葢總數壹顆通壹百叁拾㭍顆
